name: Publish to GitHub Packages & Docker Hub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g., v2.0.0)"
        required: true
        type: string

env:
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  publish-maven:
    name: Publish — common module to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build common module
        run: mvn -B -ntp -DskipTests clean package -pl common -am

      - name: Publish common module to GitHub Packages
        run: >-
          mvn -B -ntp -DskipTests deploy
          -pl common
          -am
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker-services:
    name: Publish — Service Images to Docker Hub
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cloud-native-task-manager-service-discovery
            context: .
            dockerfile: service-discovery/Dockerfile
          - image: cloud-native-task-manager-api-gateway
            context: .
            dockerfile: api-gateway/Dockerfile
          - image: cloud-native-task-manager-auth-service
            context: .
            dockerfile: auth-service/Dockerfile
          - image: cloud-native-task-manager-task-service
            context: .
            dockerfile: task-service/Dockerfile
          - image: cloud-native-task-manager-user-service
            context: .
            dockerfile: user-service/Dockerfile
          - image: cloud-native-task-manager-frontend
            context: .
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_ORG }}/${{ matrix.image }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKERHUB_ORG }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

