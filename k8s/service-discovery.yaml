# Service Discovery (Eureka) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery
  namespace: task-management
  labels:
    app: service-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-discovery
  template:
    metadata:
      labels:
        app: service-discovery
    spec:
      containers:
      - name: service-discovery
        image: task-management-platform/service-discovery:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8761
          name: eureka
        livenessProbe:
          httpGet:
            path: /eureka
            port: 8761
          initialDelaySeconds: 40
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /eureka
            port: 8761
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: service-discovery
  namespace: task-management
  labels:
    app: service-discovery
spec:
  type: ClusterIP
  ports:
  - port: 8761
    targetPort: 8761
    name: eureka
  selector:
    app: service-discovery

