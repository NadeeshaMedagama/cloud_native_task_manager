# ============================================================================
# CI/CD Pipeline
# ============================================================================
# Builds, tests, and deploys the Task Management Platform.
# Triggers on push/PR to main, manual dispatch, and weekly schedule.
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ── Backend Build & Test ──────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Test (All Modules)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and test all Java modules
        run: mvn -B -ntp clean verify

      - name: Package Java services
        run: mvn -B -ntp -DskipTests package

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            auth-service/target/*.jar
            task-service/target/*.jar
            user-service/target/*.jar
            api-gateway/target/*.jar
            service-discovery/target/*.jar
          retention-days: 7

  # ── Frontend Build & Test ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 7

  # ── Docker Build & Push — Services to Docker Hub ─────────────────────────
  docker-push-services:
    name: Docker — Push Service Images
    runs-on: ubuntu-latest
    needs: [backend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service-discovery
          - service: api-gateway
          - service: auth-service
          - service: task-service
          - service: user-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (${{ matrix.service }})
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_ORG }}/cloud-native-task-manager-${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest

      - name: Build & push ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Build & Push — Frontend to Docker Hub ─────────────────────────
  docker-push-frontend:
    name: Docker — Push Frontend to Docker Hub
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (frontend)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_ORG }}/cloud-native-task-manager-frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-push-services, docker-push-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy notification
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.environment || 'production' }}"
          echo "Service images: ${{ env.DOCKERHUB_ORG }}/cloud-native-task-manager-<service>:latest"
          echo "Frontend image: ${{ env.DOCKERHUB_ORG }}/cloud-native-task-manager-frontend:latest"
          echo ""
          echo "ℹ️  Add your deployment steps here (e.g., kubectl apply, docker compose up, etc.)"

